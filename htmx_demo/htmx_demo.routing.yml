htmx_demo.page:
  path: '/htmx-demo'
  defaults:
    _controller: '\Drupal\htmx_demo\Controller\HtmxDemoController::page'
    _title: 'HTMX Demo'
  requirements:
    _permission: 'access content'

htmx_demo.data:
  path: '/htmx-demo/data'
  defaults:
    _controller: '\Drupal\htmx_demo\Controller\HtmxDemoController::data'
  requirements:
    _permission: 'access content'
